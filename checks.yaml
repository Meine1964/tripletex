        status: likely
        what: "organizationNumber field matches task"
      - id: check_3
        name: "Email correct"
        status: likely
        what: "email and/or invoiceEmail matches task"
      - id: check_4
        name: "Address or phone"
        status: uncertain
        what: "Additional contact details match (address, phone)"

  # ── Invoice (Create + optionally Send) ────────────────────────
  invoice_create:
    keywords: ["faktura", "invoice", "Rechnung", "factura", "facture"]
